# Configuration file

splash {
    # Background color (hex RRGGBB)
    S:background=0xEF323D

    # Background color night mode (hex RRGGBB)
    S:backgroundDark=0x282C34

    # Progress bar fill color (hex RRGGBB)
    S:bar=0xFFFFFF

    # Progress bar background color (hex RRGGBB)
    S:barBackground=0xEF323D

    # Progress bar background color night mode (hex RRGGBB)
    S:barBackgroundDark=0x282C34

    # Progress bar border color (hex RRGGBB)
    S:barBorder=0xFFFFFF

    # Progress bar border color night mode (hex RRGGBB)
    S:barBorderDark=0xBBBBBB

    # Progress bar fill color night mode (hex RRGGBB)
    S:barDark=0xBBBBBB

    # Dark mode end time (HHmm) [range: 0 ~ 2359, default: 600]
    I:darkEndTime=600

    # Force dark mode always (ignores time range) [default: false]
    B:darkModeOnly=true

    # Dark mode start time (HHmm) [range: 0 ~ 2359, default: 2300]
    I:darkStartTime=2300

    # Show the startup timer [default: true]
    B:enableTimer=true

    # Enable the custom splash screen [default: true]
    B:enabled=true

    # Font color (hex RRGGBB)
    S:font=0xFFFFFF

    # Font color night mode (hex RRGGBB)
    S:fontDark=0xBBBBBB

    # Font texture resource location [default: textures/font/ascii.png]
    S:fontTexture=textures/font/ascii.png

    # Show the Forge logo [default: false]
    B:forgeLogo=false

    # Forge logo texture resource location [default: fml:textures/gui/forge.png]
    S:forgeTexture=fml:textures/gui/forge.png

    # Logo color (hex RRGGBB)
    S:logo=0xFFFFFF

    # Logo color night mode (hex RRGGBB)
    S:logoDark=0xBBBBBB

    # Logo offset in pixels [range: -999 ~ 999, default: 0]
    I:logoOffset=0

    # Memory bar color (good, hex RRGGBB)
    S:memoryGood=0xFFFFFF

    # Memory bar color night mode (good, hex RRGGBB)
    S:memoryGoodDark=0xBBBBBB

    # Memory bar color (low, hex RRGGBB)
    S:memoryLow=0xFFFFFF

    # Memory bar color night mode (low, hex RRGGBB)
    S:memoryLowDark=0xEF596F

    # Memory bar color (warn, hex RRGGBB)
    S:memoryWarn=0xFFFFFF

    # Memory bar color night mode (warn, hex RRGGBB)
    S:memoryWarnDark=0xD19A66

    # Only show main progress bar and logo [default: false]
    B:mimicModern=false

    # Resource pack directory path [default: resources]
    S:resourcePackPath=resources

    # Rotate the Forge logo [default: false]
    B:rotate=false

    # Show the memory usage bar [default: true]
    B:showMemory=true

    # Show the total memory line on the memory bar [default: false]
    B:showTotalMemoryLine=true

    # Show startup time on the main menu [default: true]
    B:timeOnMainMenu=true
}


